version: "3.9"

services:
  tideproxy:
    build: .
    image: tideproxy:latest
    container_name: tideproxy
    restart: unless-stopped
    ports:
      - "8080:8080"   # Tide frontend + proxy endpoint
      - "9090:9090"   # Health / metrics (keep internal in prod)
    environment:
      PROXY_HTTP_ADDR:       ":8080"
      PROXY_HEALTH_ADDR:     ":9090"
      PROXY_AUTH_MODE:       "${PROXY_AUTH_MODE:-none}"
      PROXY_AUTH_USERS:      "${PROXY_AUTH_USERS:-}"
      PROXY_IP_WHITELIST:    "${PROXY_IP_WHITELIST:-}"
      PROXY_BLOCK_PRIVATE:   "${PROXY_BLOCK_PRIVATE:-true}"
      PROXY_MAX_CONNECTIONS: "${PROXY_MAX_CONNECTIONS:-10000}"
      PROXY_LOG_LEVEL:       "${PROXY_LOG_LEVEL:-info}"
      PROXY_LOG_FORMAT:      "${PROXY_LOG_FORMAT:-json}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9090/health')\" || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
